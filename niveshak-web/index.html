<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0,
                   maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Primary meta -->
    <title>Niveshak.AI — Goal-Matched Investment Discovery</title>
    <meta name="description"
          content="Aapke sapno ke liye, sahi nivesh — India's first goal-matched investment discovery platform. From ₹500/mo to ₹5L/mo, we match your life goal to the right instruments." />
    <meta name="keywords"
          content="investment, SIP, mutual fund, PPF, NPS, Sukanya, goal planning, India, nivesh, retirement" />
    <meta name="author" content="Niveshak.AI" />

    <!-- PWA -->
    <meta name="theme-color" content="#1A7A52" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Niveshak.AI" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://niveshak.ai/" />
    <meta property="og:title"       content="Niveshak.AI — Goal-Matched Investment Discovery" />
    <meta property="og:description" content="Aapke sapno ke liye, sahi nivesh. Match your life goal to the right investment instrument — from Post Office schemes to Mutual Funds." />
    <meta property="og:image"       content="https://niveshak.ai/og-image.png" />
    <meta property="og:locale"      content="en_IN" />

    <!-- Twitter card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Niveshak.AI — Goal-Matched Investment Discovery" />
    <meta name="twitter:description" content="Aapke sapno ke liye, sahi nivesh. Match your life goal to the right instrument." />
    <meta name="twitter:image"       content="https://niveshak.ai/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Dark mode: apply class synchronously before first paint to avoid flash -->
    <script>
      (function(){
        try {
          var s = localStorage.getItem('niveshak-theme');
          var d = s ? JSON.parse(s) : null;
          if (d && d.state && d.state.theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {}
      })();
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap"
          rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
